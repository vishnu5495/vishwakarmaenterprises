[1:04 PM, 6/29/2026] VISHWAKARMA JI: <!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>लॉगिन - Vishwakarma Enterprises</title>
    <style>
        /* सुंदर और आधुनिक डिज़ाइन के लिए CSS */
        :root {
            --primary-color: #1b4332;
            --accent-color: #52b788;
            --bg-light: #f4f9f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            border-top: 6px solid var(--primary-color);
        }

        .login-container h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .login-container p {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--primary-color);
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbdad2;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            border-color: var(--accent-color);
        }

        .btn-login {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-login:hover {
            background-color: #2d6a4f;
        }

        .extra-links {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
        }

        .extra-links a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
        }

        .extra-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>लॉगिन करें</h2>
        <p>Vishwakarma Enterprises में आपका स्वागत है</p>
        
        <!-- Login Form -->
        <form action="index.html" method="GET">
            <div class="form-group">
                <label for="username">यूज़रनेम / ईमेल (Username/Email)</label>
                <input type="text" id="username" placeholder="अपना यूज़रनेम दर्ज करें" required>
            </div>
            
            <div class="form-group">
                <label for="password">पासवर्ड (Password)</label>
                <input type="password" id="password" placeholder="अपना पासवर्ड दर्ज करें" required>
            </div>
            
            <button type="submit" class="btn-login">प्रवेश करें (Login)</button>
        </form>

        <div class="extra-links">
            <a href="#">पासवर्ड भूल गए?</a> | <a href="index.html">होम पेज पर जाएं</a>
        </div>
    </div>

</body>
</html>
