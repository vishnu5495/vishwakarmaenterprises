<!DOCTYPE html>
<html lang="en">
<head>

<title>Vishwakarma Enterprises</title>

<style>

margin:0;

body{

justify-content:center;

background:linear-gradient(135deg,#0f5132,#198754);

.login-container{

.tagline{

padding:14px;

button{
width:100%;
padding:14px;
border:none;
background:#198754;
color:white;
font-size:18px;
border-radius:10px;

button:hover{

.contact{
